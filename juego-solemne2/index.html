<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🩺Quiz Clínico</title>
<style>
    .volver-menu {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 999;
    background: #1c2e4a;
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 14px;
    border-radius: 999px;
    box-shadow: 0 4px 12px rgba(0,0,0,.22);
  }

  .volver-menu:hover {
    background: #2e4d7d;
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --verde: #0D7A5F;
    --verde-claro: #12A87F;
    --verde-pale: #E8F7F3;
    --azul: #1B4F8A;
    --azul-claro: #2563B0;
    --azul-pale: #EBF1FA;
    --rojo: #C0392B;
    --rojo-pale: #FDEEEC;
    --amarillo: #E67E22;
    --amarillo-pale: #FEF5E7;
    --gris-dark: #1A1D23;
    --gris-med: #4A5568;
    --gris-light: #E2E8F0;
    --blanco: #FFFFFF;
    --fondo: #F6F8FA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--gris-dark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--azul) 0%, var(--verde) 100%);
    color: white;
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
  .logo p { font-size: 0.72rem; opacity: 0.8; font-weight: 400; }

  .score-panel {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .score-item {
    text-align: center;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 6px 16px;
  }
  .score-item .val {
    font-size: 1.5rem;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .score-item .lbl { font-size: 0.65rem; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Vitals bar */
  .vitals-bar {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .vitals-label { font-size: 0.7rem; opacity: 0.75; white-space: nowrap; }
  .progress-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #56E0B4, #AAFCE6);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .pulse-dot {
    width: 10px; height: 10px;
    background: white;
    border-radius: 50%;
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-50%);
    box-shadow: 0 0 0 0 rgba(255,255,255,0.7);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
    70% { box-shadow: 0 0 0 6px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }
  .progress-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    opacity: 0.9;
    min-width: 36px;
    text-align: right;
  }

  /* ── MAIN ── */
  main { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── TEMA SELECTOR ── */
  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gris-med);
    margin-bottom: 10px;
  }
  .temas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .tema-btn {
    background: white;
    border: 2px solid var(--gris-light);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .tema-btn:hover { border-color: var(--verde-claro); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(18,168,127,0.15); }
  .tema-btn.activo { border-color: var(--verde-claro); background: var(--verde-pale); }
  .tema-btn .tema-icon { font-size: 1.4rem; margin-bottom: 4px; display: block; }
  .tema-btn .tema-nombre { font-size: 0.82rem; font-weight: 600; line-height: 1.3; color: var(--gris-dark); }
  .tema-btn .tema-n { font-size: 0.68rem; color: var(--gris-med); margin-top: 4px; }
  .tema-btn .check-badge {
    position: absolute; top: 8px; right: 8px;
    width: 18px; height: 18px;
    background: var(--verde-claro);
    border-radius: 50%;
    color: white;
    font-size: 10px;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .tema-btn.completado .check-badge { display: flex; }

  /* MODO MIXTO */
  .mix-btn {
    background: linear-gradient(135deg, var(--azul), var(--verde));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 22px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .mix-btn:hover { opacity: 0.92; transform: translateY(-1px); }

  /* ── QUIZ AREA ── */
  #quiz-area { display: none; }
  .quiz-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    background: white;
    border: 2px solid var(--gris-light);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--gris-med);
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--azul); color: var(--azul); }
  .quiz-tema-tag {
    background: var(--azul-pale);
    color: var(--azul-claro);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .pregunta-counter {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--gris-med);
  }

  .card-pregunta {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 28px;
    margin-bottom: 16px;
    border-left: 5px solid var(--azul-claro);
  }
  .badge-tipo {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .badge-tipo.mc { background: var(--azul-pale); color: var(--azul-claro); }
  .badge-tipo.tf { background: var(--amarillo-pale); color: var(--amarillo); }
  .badge-tipo.caso { background: #F3E8FF; color: #7C3AED; }

  .enunciado {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 22px;
    color: var(--gris-dark);
  }
  .enunciado .dato {
    font-family: 'JetBrains Mono', monospace;
    background: var(--fondo);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.92em;
    color: var(--azul);
  }

  .opciones { display: flex; flex-direction: column; gap: 10px; }
  .opcion-btn {
    background: var(--fondo);
    border: 2px solid var(--gris-light);
    border-radius: 10px;
    padding: 13px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    color: var(--gris-dark);
    transition: all 0.18s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.4;
  }
  .opcion-btn:hover:not(:disabled) { border-color: var(--azul-claro); background: var(--azul-pale); }
  .opcion-btn .opt-letra {
    font-weight: 700;
    font-size: 0.78rem;
    min-width: 20px;
    height: 20px;
    background: var(--gris-light);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gris-med);
    margin-top: 1px;
    flex-shrink: 0;
  }
  .opcion-btn.correcta { border-color: var(--verde-claro) !important; background: var(--verde-pale) !important; color: var(--verde) !important; }
  .opcion-btn.correcta .opt-letra { background: var(--verde-claro); color: white; }
  .opcion-btn.incorrecta { border-color: var(--rojo) !important; background: var(--rojo-pale) !important; color: var(--rojo) !important; }
  .opcion-btn.incorrecta .opt-letra { background: var(--rojo); color: white; }
  .opcion-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback-box {
    display: none;
    margin-top: 16px;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.88rem;
    line-height: 1.55;
  }
  .feedback-box.correcto { background: var(--verde-pale); border-left: 4px solid var(--verde-claro); color: #0A5C47; }
  .feedback-box.incorrecto { background: var(--rojo-pale); border-left: 4px solid var(--rojo); color: #7B1D14; }
  .feedback-box .fb-titulo { font-weight: 700; margin-bottom: 4px; font-size: 0.95rem; }
  .feedback-box .fb-detalle { margin-top: 6px; opacity: 0.9; }

  .btn-siguiente {
    display: none;
    margin-top: 16px;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    width: 100%;
  }
  .btn-siguiente:hover { background: var(--verde-claro); transform: translateY(-1px); }

  /* ── RESULTADO FINAL ── */
  #resultado { display: none; text-align: center; }
  .resultado-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 32px;
  }
  .resultado-emoji { font-size: 4rem; margin-bottom: 12px; display: block; }
  .resultado-titulo { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
  .resultado-subtitulo { color: var(--gris-med); margin-bottom: 28px; font-size: 0.95rem; }
  .resultado-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .rstat {
    background: var(--fondo);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 110px;
  }
  .rstat .rv { font-size: 2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .rstat .rl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gris-med); margin-top: 2px; }
  .btn-reiniciar {
    background: linear-gradient(135deg, var(--azul), var(--verde));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    margin: 6px;
    transition: opacity 0.15s;
  }
  .btn-reiniciar:hover { opacity: 0.9; }

  /* Selector temas */
  #selector { display: block; }

  /* Animaciones */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-pregunta { animation: slideIn 0.28s ease; }

  /* Responsive */
  @media (max-width: 560px) {
    .temas-grid { grid-template-columns: 1fr 1fr; }
    .score-panel { gap: 10px; }
    .score-item { padding: 5px 10px; }
    .score-item .val { font-size: 1.2rem; }
    main { padding: 16px 12px 50px; }
  }

  /* Barra flash correcto/incorrecto */
  .flash-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    z-index: 999;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease, background 0s;
  }
  .flash-bar.show-verde { background: var(--verde-claro); transform: scaleX(1); }
  .flash-bar.show-rojo { background: var(--rojo); transform: scaleX(1); }

  /* Botón reiniciar global */
  .btn-reset-global {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.35);
    color: white;
    border-radius: 10px;
    width: 40px; height: 40px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .btn-reset-global:hover { background: rgba(255,255,255,0.3); transform: rotate(-20deg) scale(1.1); }

  /* Tooltip datos clínicos */
  .tip {
    border-bottom: 1px dashed var(--azul-claro);
    cursor: help;
    color: var(--azul-claro);
  }
</style>
</head>
<body>

<div class="flash-bar" id="flashBar"></div>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🩺</div>
      <div>
        <h1>Solemne 2 EFER 502</h1>
        <p>Material elaborado por: Victoria Catalina Tiznado Jara</p>
      </div>
    </div>
    <div class="score-panel">
      <div class="score-item">
        <div class="val" id="scoreCorrectas">0</div>
        <div class="lbl">Correctas</div>
      </div>
      <div class="score-item">
        <div class="val" id="scoreTotal">0</div>
        <div class="lbl">Respondidas</div>
      </div>
      <div class="score-item" style="background:rgba(255,255,255,0.25)">
        <div class="val" id="scorePct">—</div>
        <div class="lbl">% acierto</div>
      </div>
      <button class="btn-reset-global" onclick="reiniciarTodo()" title="Reiniciar todo el progreso">↺</button>
    </div>
  </div>
  <div class="vitals-bar">
    <span class="vitals-label">Progreso solemne</span>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%">
        <div class="pulse-dot"></div>
      </div>
    </div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
</header>

<main>
  <!-- SELECTOR -->
  <div id="selector">
    <p class="section-title">Selecciona un tema o inicia modo mixto</p>
    <button class="mix-btn" onclick="iniciarModo('mix')">🔀 Modo Mixto — Todas las preguntas aleatorias</button>
    <div class="temas-grid" id="temasGrid"></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-area">
    <div class="quiz-header">
      <button class="back-btn" onclick="volverSelector()">← Volver</button>
      <span class="quiz-tema-tag" id="quizTemaTag">—</span>
      <span class="pregunta-counter" id="preguntaCounter">1 / —</span>
    </div>
    <div class="card-pregunta" id="cardPregunta">
      <span class="badge-tipo mc" id="badgeTipo">Opción Múltiple</span>
      <p class="enunciado" id="enunciado"></p>
      <div class="opciones" id="opciones"></div>
      <div class="feedback-box" id="feedbackBox">
        <div class="fb-titulo" id="fbTitulo"></div>
        <div class="fb-detalle" id="fbDetalle"></div>
      </div>
    </div>
    <button class="btn-siguiente" id="btnSiguiente" onclick="siguientePregunta()">Siguiente pregunta →</button>
  </div>

  <!-- RESULTADO -->
  <div id="resultado">
    <div class="resultado-card">
      <span class="resultado-emoji" id="resEmoji">🏆</span>
      <div class="resultado-titulo" id="resTitulo">¡Excelente!</div>
      <div class="resultado-subtitulo" id="resSubtitulo"></div>
      <div class="resultado-stats">
        <div class="rstat"><div class="rv" id="resCorr" style="color:var(--verde)">—</div><div class="rl">Correctas</div></div>
        <div class="rstat"><div class="rv" id="resIncorr" style="color:var(--rojo)">—</div><div class="rl">Incorrectas</div></div>
        <div class="rstat"><div class="rv" id="resPct" style="color:var(--azul)">—</div><div class="rl">% logro</div></div>
      </div>
      <button class="btn-reiniciar" onclick="reiniciarTema()">🔄 Repetir tema</button>
      <button class="btn-reiniciar" onclick="volverSelector()" style="background:white;color:var(--azul);border:2px solid var(--azul);">← Cambiar tema</button>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════
//  BASE DE PREGUNTAS
// ═══════════════════════════════════════════════
const TEMAS = [
  {
    id: 'pscv', nombre: 'Programa de Salud Cardiovascular', icon: '❤️',
    preguntas: [
      {
        tipo: 'mc',
        enunciado: '¿Cuál es el objetivo principal del Programa de Salud Cardiovascular (PSCV) en Chile?',
        opciones: [
          'Prevenir exclusivamente el infarto agudo al miocardio en mayores de 65 años',
          'Reducir la morbimortalidad cardiovascular mediante seguimiento de factores de riesgo y enfermedades crónicas en APS',
          'Financiar cirugías cardíacas de alta complejidad a través del GES',
          'Prescribir estatinas a toda la población mayor de 40 años'
        ],
        correcta: 1,
        feedback: 'El PSCV busca reducir la morbimortalidad cardiovascular a través del seguimiento periódico de personas con HTA, DM2, dislipidemia y enfermedad cardiovascular establecida en el nivel primario (APS). Incorpora estratificación de riesgo y metas terapéuticas.'
      },
      {
        tipo: 'mc',
        enunciado: '¿Qué patologías forman parte del PSCV?',
        opciones: [
          'Hipertensión arterial, Diabetes Mellitus tipo 2, Dislipidemia y Enfermedad cardiovascular establecida',
          'HTA, DM tipo 1, Obesidad y Síndrome metabólico',
          'Hipercolesterolemia, Arritmias, HTA y DM tipo 2',
          'Solo HTA y DM tipo 2'
        ],
        correcta: 0,
        feedback: 'El PSCV incluye: HTA, DM tipo 2, Dislipidemia y enfermedad cardiovascular establecida (ECV). La DM tipo 1 no está incluida en este programa y se maneja en forma separada.'
      },
      {
        tipo: 'mc',
        enunciado: '¿Con qué frecuencia mínima debe controlarse un paciente con HTA compensada sin otros factores de riesgo en el PSCV?',
        opciones: [
          'Cada mes',
          'Cada 6 meses',
          'Anualmente',
          'Cada 3 meses'
        ],
        correcta: 1,
        feedback: 'Los pacientes compensados del PSCV deben controlarse al menos cada 6 meses. Los pacientes descompensados o de alto riesgo requieren controles más frecuentes (mensual o según indicación médica).'
      },
      {
        tipo: 'mc',
        enunciado: '¿Cuál es la meta de presión arterial para un paciente hipertenso sin complicaciones en el PSCV?',
        opciones: [
          'PA < 160/100 mmHg',
          'PA < 140/90 mmHg',
          'PA < 130/80 mmHg',
          'PA < 120/70 mmHg'
        ],
        correcta: 1,
        feedback: 'La meta general de PA en el PSCV es < 140/90 mmHg. En pacientes con DM, ERC o alto riesgo CV, la meta puede ser < 130/80 mmHg según guías clínicas MINSAL.'
      },
      {
        tipo: 'tf',
        enunciado: '¿Verdadero o Falso? El PSCV es financiado íntegramente por el sistema GES (Garantías Explícitas en Salud).',
        opciones: ['Verdadero', 'Falso'],
        correcta: 1,
        feedback: 'FALSO. El PSCV es un programa de salud pública que opera en APS con presupuesto del MINSAL, pero no todas sus prestaciones son GES. Algunas patologías del programa SÍ tienen cobertura GES (ej: HTA primaria, DM2 en menores de 15 años), pero el programa en sí es más amplio.'
      },
      {
        tipo: 'caso',
        enunciado: 'Paciente de 58 años, HTA + DM2, acude a control PSCV. PA: 155/95 mmHg, HbA1c: 8.9%, IMC 31. ¿Cuál es la clasificación de riesgo cardiovascular más probable?',
        opciones: [
          'Riesgo bajo (< 5% a 10 años)',
          'Riesgo moderado (5–10% a 10 años)',
          'Riesgo alto (> 10% a 10 años)',
          'No se puede calcular sin exámenes adicionales'
        ],
        correcta: 2,
        feedback: 'La combinación de HTA descompensada + DM2 descompensada (HbA1c > 7%) + obesidad (IMC ≥ 30) coloca a este paciente en riesgo alto. El riesgo cardiovascular se estima con la tabla Framingham adaptada para Chile o la puntuación OMS/MINSAL.'
      }
    ]

// ═══════════════════════════════════════════════
function renderTemas() {
  const grid = document.getElementById('temasGrid');
  grid.innerHTML = '';
  TEMAS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tema-btn' + (estado.temasCompletados.has(t.id) ? ' completado' : '');
    btn.innerHTML = `
      <div class="check-badge">✓</div>
      <span class="tema-icon">${t.icon}</span>
      <div class="tema-nombre">${t.nombre}</div>
      <div class="tema-n">${t.preguntas.length} preguntas</div>
    `;
    btn.onclick = () => iniciarModo(t.id);
    grid.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════
//  INICIAR MODO
// ═══════════════════════════════════════════════
function iniciarModo(temaId) {
  if (temaId === 'mix') {
    estado.modoMix = true;
    estado.temaActual = null;
    let todas = [];
    TEMAS.forEach(t => t.preguntas.forEach(p => todas.push({ ...p, _tema: t.nombre })));
    estado.preguntasModo = shuffle(todas);
    document.getElementById('quizTemaTag').textContent = '🔀 Modo Mixto';
  } else {
    estado.modoMix = false;
    const tema = TEMAS.find(t => t.id === temaId);
    estado.temaActual = tema;
    estado.preguntasModo = shuffle([...tema.preguntas]);
    document.getElementById('quizTemaTag').textContent = tema.icon + ' ' + tema.nombre;
  }
  estado.indice = 0;
  estado.correctas = 0;
  estado.respondidas = 0;

  document.getElementById('selector').style.display = 'none';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';

  mostrarPregunta();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

    mostrarResultado();
    return;

  optDiv.innerHTML = '';
  const letras = ['A', 'B', 'C', 'D'];
  p.opciones.forEach((op, i) => {
    const btn = document.createElement('button');
    btn.className = 'opcion-btn';
    btn.innerHTML = `<span class="opt-letra">${letras[i]}</span><span>${op}</span>`;
    btn.onclick = () => responder(i, p);
    optDiv.appendChild(btn);
  });

  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('btnSiguiente').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  RESPONDER
// ═══════════════════════════════════════════════
function responder(idx, p) {
  const botones = document.querySelectorAll('.opcion-btn');
  botones.forEach(b => b.disabled = true);

  const esCorrecta = idx === p.correcta;
  botones[idx].classList.add(esCorrecta ? 'correcta' : 'incorrecta');
  if (!esCorrecta) botones[p.correcta].classList.add('correcta');

  const fb = document.getElementById('feedbackBox');
  const fbTitulo = document.getElementById('fbTitulo');
  const fbDetalle = document.getElementById('fbDetalle');

  if (esCorrecta) {
    fb.className = 'feedback-box correcto';
    fbTitulo.textContent = '✅ ¡Correcto!';
    estado.correctas++;
    flashBar('verde');
  } else {
    fb.className = 'feedback-box incorrecto';
    fbTitulo.textContent = '❌ Incorrecto';
    flashBar('rojo');
  }
  fbDetalle.textContent = p.feedback;
  fb.style.display = 'block';
  document.getElementById('btnSiguiente').style.display = 'block';

  estado.respondidas++;
  estado.total++;
  actualizarScore();
}

function flashBar(color) {
  const bar = document.getElementById('flashBar');
  bar.className = `flash-bar show-${color}`;
  setTimeout(() => { bar.className = 'flash-bar'; }, 700);
}

// ═══════════════════════════════════════════════
//  SIGUIENTE PREGUNTA
// ═══════════════════════════════════════════════
function siguientePregunta() {
  estado.indice++;
  mostrarPregunta();
}

// ═══════════════════════════════════════════════
//  ACTUALIZAR SCORE
// ═══════════════════════════════════════════════
function actualizarScore() {
  document.getElementById('scoreCorrectas').textContent = estado.correctas;
  document.getElementById('scoreTotal').textContent = estado.total;
  const pct = estado.total > 0 ? Math.round((estado.correctas / estado.total) * 100) : null;
  document.getElementById('scorePct').textContent = pct !== null ? pct + '%' : '—';

  // Progreso global (basado en preguntas respondidas de todas las sesiones)
  const progPct = Math.min(100, Math.round((estado.total / totalPreguntas) * 100));
  document.getElementById('progressFill').style.width = progPct + '%';
  document.getElementById('progressPct').textContent = progPct + '%';
}

// ═══════════════════════════════════════════════
//  RESULTADO FINAL
// ═══════════════════════════════════════════════
function mostrarResultado() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('resultado').style.display = 'block';

  const pct = Math.round((estado.correctas / estado.respondidas) * 100);
  let emoji, titulo, sub;
  if (pct >= 90) { emoji = '🏆'; titulo = '¡Excelente!'; sub = 'Dominas el tema. Estás lista para la solemne.'; }
  else if (pct >= 75) { emoji = '⭐'; titulo = '¡Muy bien!'; sub = 'Buen manejo del contenido. Repasa los temas fallados.'; }
  else if (pct >= 60) { emoji = '📚'; titulo = 'Bien, pero a repasar'; sub = 'Hay conceptos que necesitan refuerzo. ¡Tú puedes!'; }
  else { emoji = '💪'; titulo = 'Sigue estudiando'; sub = 'Este tema necesita más repaso. ¡Vuélvelo a intentar!'; }

  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resTitulo').textContent = titulo;
  document.getElementById('resSubtitulo').textContent = sub;
  document.getElementById('resCorr').textContent = estado.correctas;
  document.getElementById('resIncorr').textContent = estado.respondidas - estado.correctas;
  document.getElementById('resPct').textContent = pct + '%';

  if (estado.temaActual) estado.temasCompletados.add(estado.temaActual.id);
}

function reiniciarTema() {
  document.getElementById('resultado').style.display = 'none';
  if (estado.modoMix) {
    iniciarModo('mix');
  } else {
    iniciarModo(estado.temaActual.id);
  }
}

function volverSelector() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('selector').style.display = 'block';
  renderTemas();
}

// ═══════════════════════════════════════════════
//  REINICIAR TODO
// ═══════════════════════════════════════════════
function reiniciarTodo() {
  if (!confirm('¿Reiniciar todo el progreso y puntaje? Esta acción no se puede deshacer.')) return;
  estado.correctas = 0;
  estado.total = 0;
  estado.respondidas = 0;
  estado.temasCompletados = new Set();
  estado.temaActual = null;
  estado.modoMix = false;
  document.getElementById('scoreCorrectas').textContent = '0';
  document.getElementById('scoreTotal').textContent = '0';
  document.getElementById('scorePct').textContent = '—';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressPct').textContent = '0%';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('selector').style.display = 'block';
  renderTemas();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderTemas();
</script>
